name: CI Pipeline - DevSecOps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python for dependency scan
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Scan Python dependencies for vulnerabilities
        run: |
          pip-audit -r app/requirements.txt --format=columns || true
          echo "Dependency scan complete"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t sre-app:latest ./app
          docker images sre-app

      - name: Push to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/sre-observability-app"
          docker tag sre-app:latest $IMAGE:latest
          docker tag sre-app:latest $IMAGE:sha-${{ github.sha }}
          docker push $IMAGE:latest
          docker push $IMAGE:sha-${{ github.sha }}
          echo "Successfully pushed $IMAGE:latest"
name: CI Pipeline - DevSecOps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-scan-push:
    name: Build, Scan and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image locally
        run: |
          docker build -t sre-app:scan ./app

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sre-app:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Push to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/sre-observability-app"
          docker tag sre-app:scan $IMAGE:latest
          docker tag sre-app:scan $IMAGE:sha-${{ github.sha }}
          docker push $IMAGE:latest
          docker push $IMAGE:sha-${{ github.sha }}